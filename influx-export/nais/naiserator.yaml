apiVersion: nais.io/v1alpha1
kind: Application
metadata:
  name: sif-influx-export
  namespace: k9saksbehandling
spec:
  image: {{image}} # Placeholder variable to be replaced by the CI/CD pipeline
  port: 8080
  replicas:
    max: 4
    min: 2
  resources:
    requests:
      cpu: 200m
      memory: 128Mi